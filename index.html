<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4efe6" />
    <title>予名 - 循典取意，因愿成名</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="予名手机取名工具">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-icon" src="./assets/logo-yuming-icon.png" alt="" aria-hidden="true" />
          <div class="brand-copy">
            <h1>予名</h1>
            <p class="eyebrow">循典取意，因愿成名</p>
          </div>
        </div>
        <button class="ghost-icon" type="button" aria-label="打开候选名字" id="openFavorites">
          <span id="favoriteCount">0</span>
        </button>
      </header>

      <section class="intro-panel">
        <p>五行有度，典籍有源，字音有致。为孩子择一个可讲、可念、可久的名字。</p>
        <div class="trust-row" aria-label="取名支撑点">
          <span>可复选依据</span>
          <span>单字/双字</span>
          <span>家人投票</span>
        </div>
      </section>

      <form class="naming-form" id="namingForm">
        <section class="form-section">
          <div class="section-title">
            <h2>基础信息</h2>
            <span>必填</span>
          </div>
          <label class="field">
            <span>姓氏</span>
            <input id="surname" maxlength="2" autocomplete="off" />
          </label>

          <div class="field">
            <span>性别偏向</span>
            <div class="segmented" data-group="gender">
              <button type="button" class="active" data-value="neutral">不限定</button>
              <button type="button" data-value="female">女孩</button>
              <button type="button" data-value="male">男孩</button>
            </div>
          </div>

          <div class="field">
            <span>名字字数</span>
            <div class="segmented" data-group="length">
              <button type="button" data-value="1">单字名</button>
              <button type="button" class="active" data-value="2">双字名</button>
              <button type="button" data-value="all">都可以</button>
            </div>
          </div>
        </section>

        <section class="form-section">
          <div class="section-title">
            <h2>取名依据</h2>
            <div class="section-tags" aria-label="填写提示">
              <span>推荐填写</span>
              <span>可多选</span>
            </div>
          </div>
          <div class="basis-grid" id="basisGrid" aria-label="选择取名依据">
            <button type="button" class="basis active" data-basis="wuxing">
              <strong>五行喜用</strong>
              <small>按木火土金水补偏向</small>
            </button>
            <button type="button" class="basis" data-basis="classic">
              <strong>典籍诗词</strong>
              <small>诗经楚辞唐宋文脉</small>
            </button>
            <button type="button" class="basis" data-basis="meaning">
              <strong>寓意祝愿</strong>
              <small>平安聪慧清朗远志</small>
            </button>
            <button type="button" class="basis" data-basis="sound">
              <strong>音律搭配</strong>
              <small>声调顺口避谐音</small>
            </button>
            <button type="button" class="basis" data-basis="shape">
              <strong>字形易写</strong>
              <small>结构平衡不生僻</small>
            </button>
            <button type="button" class="basis" data-basis="season">
              <strong>生肖节气</strong>
              <small>从出生时令取意象</small>
            </button>
            <button type="button" class="basis" data-basis="bazi">
              <strong>生辰八字</strong>
              <small>四柱干支与喜用合参</small>
            </button>
            <button type="button" class="basis" data-basis="yijing">
              <strong>周易取象</strong>
              <small>易经八卦象意相参</small>
            </button>
          </div>
        </section>

        <section class="form-section compact" id="wuxingPanel">
          <div class="section-title">
            <h2>五行偏向</h2>
            <span>民俗参考</span>
          </div>
          <div class="chip-row" data-chip-group="element">
            <button type="button" class="chip active" data-value="auto">自动平衡</button>
            <button type="button" class="chip" data-value="木">补木</button>
            <button type="button" class="chip" data-value="火">补火</button>
            <button type="button" class="chip" data-value="土">补土</button>
            <button type="button" class="chip" data-value="金">补金</button>
            <button type="button" class="chip" data-value="水">补水</button>
          </div>
        </section>

        <section class="form-section compact">
          <div class="section-title">
            <h2>风格与寓意</h2>
            <div class="section-tags" aria-label="填写提示">
              <span>推荐填写</span>
              <span>可多选</span>
            </div>
          </div>
          <div class="field">
            <span>名字气质</span>
            <div class="chip-row multi" id="styleChips">
              <button type="button" class="chip active" data-value="书卷气">书卷气</button>
              <button type="button" class="chip" data-value="清朗">清朗</button>
              <button type="button" class="chip" data-value="温润">温润</button>
              <button type="button" class="chip" data-value="大气">大气</button>
              <button type="button" class="chip" data-value="现代">现代</button>
              <button type="button" class="chip" data-value="少见不生僻">少见不生僻</button>
            </div>
          </div>

          <div class="field select-field">
            <span>希望寄托</span>
            <select id="wish" class="native-select-value" aria-hidden="true" tabindex="-1">
              <option value="平安">平安顺遂</option>
              <option value="聪慧">聪慧明达</option>
              <option value="远志">胸怀远志</option>
              <option value="仁爱">仁爱温厚</option>
              <option value="自由">自由开阔</option>
              <option value="清雅">清雅从容</option>
            </select>
            <button type="button" class="calendar-input calendar-trigger choice-trigger" id="wishTrigger" data-select-target="wish" aria-haspopup="dialog" aria-controls="choicePicker">
              <span class="calendar-value" id="wishTriggerText">平安顺遂</span>
              <span class="calendar-arrow" aria-hidden="true"></span>
            </button>
          </div>
        </section>

        <section class="form-section compact">
          <div class="section-title">
            <h2>高级偏好</h2>
            <span>可选</span>
          </div>
          <div class="field calendar-field">
            <span>出生时间</span>
            <div class="segmented two calendar-switch" data-group="calendarType">
              <button type="button" class="active" data-value="solar">公历</button>
              <button type="button" data-value="lunar">农历</button>
            </div>
            <button type="button" id="birthdaySolar" class="calendar-input calendar-trigger" data-value="" aria-haspopup="dialog" aria-controls="solarPicker">
              <span id="birthdaySolarText" class="calendar-value placeholder">选择公历出生时间</span>
              <span class="calendar-arrow" aria-hidden="true"></span>
            </button>
            <button type="button" id="birthdayLunar" class="calendar-input calendar-trigger" data-value="" aria-haspopup="dialog" aria-controls="lunarPicker" hidden>
              <span id="birthdayLunarText" class="calendar-value placeholder">选择农历出生时间</span>
              <span class="calendar-arrow" aria-hidden="true"></span>
            </button>
          </div>
          <div class="optional-block">
            <button type="button" class="add-option" id="toggleGeneration" aria-expanded="false">
              添加字辈
            </button>
            <div class="generation-panel" id="generationPanel" hidden>
              <div class="generation-grid">
                <label class="field generation-char-field">
                  <span>字辈用字</span>
                  <input id="generationChar" maxlength="1" placeholder="例：承" />
                </label>
                <div class="field">
                  <span>字辈位置</span>
                  <div class="segmented two" data-group="generationPosition">
                    <button type="button" class="active" data-value="first">首字</button>
                    <button type="button" data-value="second">末字</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="double-field aligned-fields">
            <label class="field">
              <span>喜欢的字</span>
              <input id="likeChars" maxlength="6" placeholder="例：知、安" />
            </label>
            <label class="field">
              <span>忌用字</span>
              <input id="avoidChars" maxlength="8" placeholder="例：梓、子" />
            </label>
          </div>
          <div class="field select-field">
            <span>方言谐音检查</span>
            <select id="region" class="native-select-value" aria-hidden="true" tabindex="-1">
              <option value="普通话优先">普通话优先</option>
              <option value="粤语检查">粤语检查</option>
              <option value="吴语检查">吴语检查</option>
              <option value="闽南语检查">闽南语检查</option>
              <option value="四川话检查">四川话检查</option>
            </select>
            <button type="button" class="calendar-input calendar-trigger choice-trigger" id="regionTrigger" data-select-target="region" aria-haspopup="dialog" aria-controls="choicePicker">
              <span class="calendar-value" id="regionTriggerText">普通话优先</span>
              <span class="calendar-arrow" aria-hidden="true"></span>
            </button>
          </div>
        </section>
      </form>

      <section class="results-section" id="resultsSection" aria-live="polite">
        <div class="results-empty">
          <strong>生成一组候选名</strong>
          <span>结果会展示名字、出处、五行、寓意、音律和提醒。</span>
        </div>
      </section>

      <section class="compare-panel" id="comparePanel" aria-label="候选名字对比">
        <div class="compare-head">
          <div>
            <p class="eyebrow">家人一起选</p>
            <h2>候选对比</h2>
          </div>
          <button type="button" class="text-button" id="closeFavorites">收起</button>
        </div>
        <div class="compare-list" id="compareList"></div>
        <button type="button" class="primary secondary" id="makePoll">生成投票文案并复制</button>
        <textarea id="pollText" readonly placeholder="收藏名字后可生成分享给家人的投票文案"></textarea>
      </section>

      <div class="picker-mask" id="solarPicker" hidden>
        <section class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="solarPickerTitle">
          <div class="picker-grip" aria-hidden="true"></div>
          <div class="picker-head">
            <div>
              <p class="eyebrow">公历时间</p>
              <h2 id="solarPickerTitle">选择出生时间</h2>
            </div>
            <button type="button" class="picker-close" id="closeSolarPicker" aria-label="关闭时间选择器">×</button>
          </div>
          <div class="picker-wheel-group date-wheel" aria-label="选择日期">
            <div class="wheel-column">
              <span>年</span>
              <div class="wheel-list" id="solarYearList"></div>
            </div>
            <div class="wheel-column">
              <span>月</span>
              <div class="wheel-list" id="solarMonthList"></div>
            </div>
            <div class="wheel-column">
              <span>日</span>
              <div class="wheel-list" id="solarDayList"></div>
            </div>
          </div>
          <div class="picker-wheel-group time-wheel" aria-label="选择时间">
            <div class="wheel-column">
              <span>时</span>
              <div class="wheel-list" id="solarHourList"></div>
            </div>
            <div class="wheel-column">
              <span>分</span>
              <div class="wheel-list" id="solarMinuteList"></div>
            </div>
          </div>
          <div class="picker-preview" id="solarPickerPreview"></div>
          <div class="picker-actions">
            <button type="button" class="outline" id="clearSolarPicker">清空</button>
            <button type="button" class="primary" id="confirmSolarPicker">确认时间</button>
          </div>
        </section>
      </div>

      <div class="picker-mask" id="lunarPicker" hidden>
        <section class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="lunarPickerTitle">
          <div class="picker-grip" aria-hidden="true"></div>
          <div class="picker-head">
            <div>
              <p class="eyebrow">农历时间</p>
              <h2 id="lunarPickerTitle">选择出生时间</h2>
            </div>
            <button type="button" class="picker-close" id="closeLunarPicker" aria-label="关闭农历时间选择器">×</button>
          </div>
          <div class="picker-wheel-group date-wheel" aria-label="选择农历日期">
            <div class="wheel-column">
              <span>年</span>
              <div class="wheel-list" id="lunarYearList"></div>
            </div>
            <div class="wheel-column">
              <span>月</span>
              <div class="wheel-list" id="lunarMonthList"></div>
            </div>
            <div class="wheel-column">
              <span>日</span>
              <div class="wheel-list" id="lunarDayList"></div>
            </div>
          </div>
          <div class="picker-wheel-group lunar-time-wheel" aria-label="选择时辰">
            <div class="wheel-column">
              <span>时辰</span>
              <div class="wheel-list" id="lunarHourList"></div>
            </div>
          </div>
          <div class="picker-preview" id="lunarPickerPreview"></div>
          <div class="picker-actions">
            <button type="button" class="outline" id="clearLunarPicker">清空</button>
            <button type="button" class="primary" id="confirmLunarPicker">确认时间</button>
          </div>
        </section>
      </div>

      <div class="picker-mask" id="choicePicker" hidden>
        <section class="picker-sheet choice-sheet" role="dialog" aria-modal="true" aria-labelledby="choicePickerTitle">
          <div class="picker-grip" aria-hidden="true"></div>
          <div class="picker-head">
            <div>
              <p class="eyebrow" id="choicePickerEyebrow">选项</p>
              <h2 id="choicePickerTitle">选择内容</h2>
            </div>
            <button type="button" class="picker-close" id="closeChoicePicker" aria-label="关闭选择器">×</button>
          </div>
          <div class="choice-list" id="choicePickerList"></div>
        </section>
      </div>

      <footer class="site-footnote">意见反馈：1411654789@qq.com</footer>

      <div class="bottom-action">
        <button type="submit" form="namingForm" class="primary" id="generateBtn">生成有依据的名字</button>
        <button type="button" class="reset-preferences" id="resetPreferencesBtn" hidden>重新选择</button>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
